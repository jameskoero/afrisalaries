version: '3.8'

services:
  api:
    build: .
    container_name: afrisalaries-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - MODEL_PATH=/app/models/model.pkl
      - VECTORIZER_PATH=/app/models/vectorizer.pkl
    volumes:
      - ./models:/app/models
      - ./logs:/app/logs
    depends_on:
      - redis
      - db
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: afrisalaries-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  db:
    image: postgres:15-alpine
    container_name: afrisalaries-db
    environment:
      POSTGRES_USER: afri
      POSTGRES_PASSWORD: afri
      POSTGRES_DB: afrisalaries
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
